<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pronos Camiloven</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-zinc-950 text-white p-4">

<h1 class="text-4xl font-bold text-yellow-400 text-center mb-8">PRONOS CAMILOVEN</h1>

<div class="grid grid-cols-3 gap-3 mb-8">
    <button onclick="window.open('https://www.betmines.com/es','_blank')" class="bg-zinc-900 p-4 rounded-2xl">Betmines</button>
    <button onclick="window.open('https://www.forebet.com/es/predicciones','_blank')" class="bg-zinc-900 p-4 rounded-2xl">Forebet</button>
    <button onclick="window.open('https://www.adamchoi.co.uk/','_blank')" class="bg-zinc-900 p-4 rounded-2xl">AdamChoi</button>
</div>

<button onclick="document.getElementById('fileInput').click()" class="w-full bg-yellow-400 hover:bg-yellow-300 text-black font-bold py-6 rounded-3xl text-xl mb-8">
    📁 CARGAR EXCEL
</button>
<input type="file" id="fileInput" accept=".xlsx" class="hidden">

<div id="sportTabs" class="flex flex-wrap gap-2 mb-6"></div>
<div id="content"></div>

<script>
let allData = {};

document.getElementById('fileInput').onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(ev) {
        try {
            const wb = XLSX.read(ev.target.result, {type: 'binary'});
            allData = {};
            
            wb.SheetNames.forEach(sheetName => {
                const json = XLSX.utils.sheet_to_json(wb.Sheets[sheetName]);
                if (json.length > 0) allData[sheetName] = json;
            });

            localStorage.setItem('pronosticosData', JSON.stringify(allData));
            mostrarDatos();
        } catch(err) {
            alert('Error al leer el Excel: ' + err.message);
        }
    };
    reader.readAsBinaryString(file);
};

function mostrarDatos() {
    const tabs = document.getElementById('sportTabs');
    const content = document.getElementById('content');
    tabs.innerHTML = '';
    content.innerHTML = '';

    Object.keys(allData).forEach(sport => {
        const btn = document.createElement('button');
        btn.textContent = sport;
        btn.className = "px-5 py-3 bg-zinc-800 rounded-full text-sm font-bold hover:bg-yellow-400 hover:text-black";
        btn.onclick = () => mostrarDeporte(sport);
        tabs.appendChild(btn);
    });

    if (Object.keys(allData).length > 0) {
        mostrarDeporte(Object.keys(allData)[0]);
    }
}

function mostrarDeporte(sport) {
    const data = allData[sport] || [];
    let html = `<h2 class="text-3xl font-bold text-yellow-400 mb-6">${sport}</h2>`;

    data.forEach(p => {
        const h = Math.round((p['1x2_h'] || 0) * 100);
        const d = Math.round((p['1x2_d'] || 0) * 100);
        const a = Math.round((p['1x2_a'] || 0) * 100);

        html += `
        <div class="bg-zinc-900 rounded-3xl p-6 mb-6">
            <div class="text-amber-400">${p.date || ''}</div>
            <div class="text-xl font-bold my-3">${p.home} vs ${p.away}</div>
            <div class="grid grid-cols-3 gap-4 text-center">
                <div><div class="text-4xl font-bold text-green-400">${h}%</div><div class="text-xs">LOCAL</div></div>
                <div><div class="text-4xl font-bold text-yellow-400">${d}%</div><div class="text-xs">EMPATE</div></div>
                <div><div class="text-4xl font-bold text-red-400">${a}%</div><div class="text-xs">VISITA</div></div>
            </div>
        </div>`;
    });

    document.getElementById('content').innerHTML = html;
}

// Cargar datos guardados
if (localStorage.getItem('pronosticosData')) {
    allData = JSON.parse(localStorage.getItem('pronosticosData'));
    mostrarDatos();
}
</script>
</body>
</html>
