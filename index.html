<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pronos Camiloven</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body {background:#09090b; color:white; font-family:system-ui,sans-serif; margin:0;}
        .neon {text-shadow:0 0 30px #eab308,0 0 60px #eab308;}
        .card {background:#171717; border:1px solid #444; border-radius:16px; padding:18px; margin:12px 0;}
        .tab {padding:12px 20px; border-radius:9999px; font-weight:bold; white-space:nowrap; margin:4px;}
        .photo-card {background:#171717; border:1px solid #444; border-radius:16px; padding:12px; margin:12px 0;}
        .photo {max-width:100%; border-radius:12px;}
    </style>
</head>
<body class="pb-20">
    <div class="p-6 text-center border-b border-yellow-500">
        <h1 class="text-5xl font-bold neon text-yellow-400">PRONOS CAMILOVEN</h1>
        <p class="text-yellow-400">by camiloven</p>
    </div>

    <div class="grid grid-cols-3 gap-3 p-6">
        <button onclick="window.open('https://www.betmines.com/es','_blank')" class="bg-zinc-800 hover:bg-zinc-700 p-4 rounded-2xl text-center">⛏️ Betmines</button>
        <button onclick="window.open('https://www.forebet.com/es/predicciones','_blank')" class="bg-zinc-800 hover:bg-zinc-700 p-4 rounded-2xl text-center">📊 Forebet</button>
        <button onclick="window.open('https://www.adamchoi.co.uk/','_blank')" class="bg-zinc-800 hover:bg-zinc-700 p-4 rounded-2xl text-center">📈 AdamChoi</button>
    </div>

    <div class="px-6 space-y-3">
        <button onclick="document.getElementById('fileInput').click()" class="w-full bg-yellow-400 text-black py-6 rounded-3xl font-bold text-xl">
            📁 CARGAR NUEVO EXCEL
        </button>
        <input type="file" id="fileInput" accept=".xlsx" class="hidden">

        <button onclick="document.getElementById('photoInput').click()" class="w-full bg-purple-600 hover:bg-purple-700 py-5 rounded-3xl font-bold">
            📸 SUBIR FOTOS Y ANALIZAR CON IA
        </button>
        <input type="file" id="photoInput" accept="image/*" multiple class="hidden">
    </div>

    <div class="px-6 text-center mb-6">
        <button onclick="showConfig()" class="text-yellow-400 underline">⚙️ Configurar Groq API Key</button>
    </div>

    <div id="photosContainer" class="px-6"></div>
    <div id="sportTabs" class="flex flex-wrap gap-2 px-6 pb-4"></div>
    <div id="content" class="px-6"></div>

<script>
let allData = {};
let currentSport = '';
let groqKey = localStorage.getItem('groqKey') || '';

// Cargar Excel
if (localStorage.getItem('pronosticosData')) {
    allData = JSON.parse(localStorage.getItem('pronosticosData'));
}

function renderTabs() {
    const container = document.getElementById('sportTabs');
    container.innerHTML = '';
    Object.keys(allData).forEach(sport => {
        const btn = document.createElement('button');
        btn.textContent = sport;
        btn.className = `tab ${currentSport === sport ? 'bg-yellow-400 text-black' : 'bg-zinc-800 text-white'}`;
        btn.onclick = () => window.switchSport(sport);
        container.appendChild(btn);
    });
}

window.switchSport = function(sport) {
    currentSport = sport;
    const data = allData[sport] || [];
    let html = `<h2 class="text-yellow-400 text-2xl font-bold mb-6 capitalize">${sport}</h2>`;
    data.forEach(p => {
        html += `
        <div class="card">
            <div style="color:#eab308">${p.date || ''}</div>
            <div style="font-size:19px;font-weight:bold;margin:12px 0">${p.home || '?'} vs ${p.away || '?'}</div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;background:#111;padding:16px;border-radius:12px">
                <div style="text-align:center"><div style="color:#4ade80;font-size:22px">${Math.round((p['1x2_h']||0)*100)}%</div><div style="font-size:11px">LOCAL</div></div>
                <div style="text-align:center"><div style="color:#fcd34d;font-size:22px">${Math.round((p['1x2_d']||0)*100)}%</div><div style="font-size:11px">EMPATE</div></div>
                <div style="text-align:center"><div style="color:#f87171;font-size:22px">${Math.round((p['1x2_a']||0)*100)}%</div><div style="font-size:11px">VISITA</div></div>
            </div>
        </div>`;
    });
    document.getElementById('content').innerHTML = html || '<p class="text-center text-gray-500 py-12">Sin datos</p>';
};

if (Object.keys(allData).length > 0) {
    renderTabs();
    window.switchSport(Object.keys(allData)[0]);
}

// Excel
document.getElementById('fileInput').onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
        try {
            const wb = XLSX.read(ev.target.result, {type:'binary'});
            allData = {};
            wb.SheetNames.forEach(name => {
                const sheetData = XLSX.utils.sheet_to_json(wb.Sheets[name]);
                if (sheetData.length > 0) allData[name] = sheetData;
            });
            localStorage.setItem('pronosticosData', JSON.stringify(allData));
            renderTabs();
            window.switchSport(Object.keys(allData)[0]);
        } catch(err) {
            alert('Error leyendo el Excel');
        }
    };
    reader.readAsBinaryString(file);
};

// Fotos y Análisis
document.getElementById('photoInput').onchange = async e => {
    const files = e.target.files;
    const container = document.getElementById('photosContainer');

    for (let file of files) {
        const reader = new FileReader();
        reader.onload = async (ev) => {
            const div = document.createElement('div');
            div.className = 'photo-card';
            div.innerHTML = `<img src="${ev.target.result}" class="photo"><p class="text-yellow-400 mt-3">🔄 Analizando...</p>`;
            container.appendChild(div);

            if (!groqKey) {
                div.innerHTML += `<p class="text-red-400">Falta la API Key de Groq</p>`;
                return;
            }

            try {
                const base64 = ev.target.result.split(',')[1];
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${groqKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama-3.2-11b-vision-preview",
                        messages: [{
                            role: "user",
                            content: [
                                {type: "text", text: "Extrae los partidos de esta imagen y devuelve solo JSON con formato: [{home, away, 1x2_h, 1x2_d, 1x2_a}]"},
                                {type: "image_url", image_url: {url: `data:image/jpeg;base64,${base64}`}}
                            ]
                        }],
                        temperature: 0.3,
                        max_tokens: 800
                    })
                });

                const result = await response.json();
                const text = result.choices[0].message.content;
                div.innerHTML += `<div class="mt-3 p-3 bg-black rounded text-xs text-green-400 overflow-auto"><pre>${text}</pre></div>`;
            } catch (err) {
                div.innerHTML += `<p class="text-red-400 mt-3">Error: ${err.message}</p>`;
            }
        };
        reader.readAsDataURL(file);
    }
};

function showConfig() {
    const key = prompt("Ingresa tu Groq API Key (gsk_...):", groqKey);
    if (key) {
        groqKey = key.trim();
        localStorage.setItem('groqKey', groqKey);
        alert("✅ Clave guardada");
    }
}
</script>
</body>
</html>
