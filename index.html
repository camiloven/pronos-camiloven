<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pronos Camiloven</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body {background:#0a0a0a; color:#e5e5e5; font-family:system-ui,sans-serif; margin:0;}
        .neon {text-shadow:0 0 20px #eab308;}
        .card {background:#121212; border-radius:20px; padding:20px; margin:16px 0; border:1px solid #333;}
        .prob {font-size:28px; font-weight:bold;}
    </style>
</head>
<body class="pb-24">
    <div class="bg-gradient-to-r from-yellow-500 to-amber-500 text-black p-6 text-center">
        <h1 class="text-4xl font-bold neon">PRONOS CAMILOVEN</h1>
        <p class="text-sm">High Probability Picks</p>
    </div>

    <div class="grid grid-cols-3 gap-3 p-6">
        <button onclick="window.open('https://www.betmines.com/es','_blank')" class="bg-zinc-900 p-4 rounded-2xl text-center">Betmines</button>
        <button onclick="window.open('https://www.forebet.com/es/predicciones','_blank')" class="bg-zinc-900 p-4 rounded-2xl text-center">Forebet</button>
        <button onclick="window.open('https://www.adamchoi.co.uk/','_blank')" class="bg-zinc-900 p-4 rounded-2xl text-center">AdamChoi</button>
    </div>

    <div class="px-6">
        <button onclick="document.getElementById('fileInput').click()" class="w-full bg-yellow-400 text-black py-6 rounded-3xl font-bold text-xl">
            📁 CARGAR EXCEL
        </button>
        <input type="file" id="fileInput" accept=".xlsx" class="hidden">
    </div>

    <div id="sportTabs" class="flex flex-wrap gap-2 px-6 pb-4"></div>
    <div id="content" class="px-6"></div>

<script>
let allData = {};
let currentSport = '';

if (localStorage.getItem('pronosticosData')) {
    allData = JSON.parse(localStorage.getItem('pronosticosData'));
}

function renderTabs() {
    const container = document.getElementById('sportTabs');
    container.innerHTML = '';
    Object.keys(allData).forEach(sport => {
        const btn = document.createElement('button');
        btn.textContent = sport.toUpperCase();
        btn.className = `px-5 py-3 rounded-full font-bold ${currentSport === sport ? 'bg-yellow-400 text-black' : 'bg-zinc-800'}`;
        btn.onclick = () => window.switchSport(sport);
        container.appendChild(btn);
    });
}

window.switchSport = function(sport) {
    currentSport = sport;
    const data = allData[sport] || [];
    let html = `<h2 class="text-yellow-400 text-2xl font-bold mb-6 px-2">${sport.toUpperCase()}</h2>`;

    data.forEach(p => {
        const h = Math.round((p['1x2_h']||0)*100);
        const d = Math.round((p['1x2_d']||0)*100);
        const a = Math.round((p['1x2_a']||0)*100);
        
        html += `
        <div class="card">
            <div class="text-amber-400 text-sm">${p.date || ''}</div>
            <div class="font-bold text-lg mt-2">${p.home} vs ${p.away}</div>
            
            <div class="grid grid-cols-3 gap-4 mt-6">
                <div class="text-center">
                    <div class="prob text-green-400">${h}%</div>
                    <div class="text-xs text-gray-400">LOCAL</div>
                </div>
                <div class="text-center">
                    <div class="prob text-yellow-400">${d}%</div>
                    <div class="text-xs text-gray-400">EMPATE</div>
                </div>
                <div class="text-center">
                    <div class="prob text-red-400">${a}%</div>
                    <div class="text-xs text-gray-400">VISITA</div>
                </div>
            </div>
            
            ${p['o_2.5'] ? `<div class="text-center mt-5 text-green-400 font-bold">Over 2.5 • ${Math.round(p['o_2.5']*100)}%</div>` : ''}
        </div>`;
    });

    document.getElementById('content').innerHTML = html || '<p class="text-center py-20 text-gray-500">Sin datos</p>';
};

if (Object.keys(allData).length > 0) {
    renderTabs();
    window.switchSport(Object.keys(allData)[0]);
}

document.getElementById('fileInput').onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
        try {
            const wb = XLSX.read(ev.target.result, {type:'binary'});
            allData = {};
            wb.SheetNames.forEach(name => {
                const sheetData = XLSX.utils.sheet_to_json(wb.Sheets[name]);
                if (sheetData.length > 0) allData[name] = sheetData;
            });
            localStorage.setItem('pronosticosData', JSON.stringify(allData));
            renderTabs();
            window.switchSport(Object.keys(allData)[0]);
        } catch(err) {
            alert('Error al leer el Excel');
        }
    };
    reader.readAsBinaryString(file);
};
</script>
</body>
</html>
