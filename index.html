<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pronos Camiloven</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body {background:#000; color:white; margin:0; font-family:system-ui,sans-serif;}
        .hero {height:100vh; position:relative; overflow:hidden;}
        video {position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; filter:brightness(0.5);}
        .content {position:relative; z-index:10;}
    </style>
</head>
<body>

    <!-- Video Intro -->
    <div class="hero flex items-center justify-center text-center">
        <video autoplay loop muted playsinline>
            <source src="https://files.catbox.moe/kyrpzq.mp4" type="video/mp4">
        </video>
        <div class="content px-6">
            <h1 class="text-6xl font-bold text-yellow-400 mb-2">PRONOS</h1>
            <h1 class="text-6xl font-bold text-yellow-400">CAMILOVEN</h1>
            
            <button onclick="document.getElementById('mainApp').scrollIntoView({behavior:'smooth'})" 
                    class="mt-16 bg-yellow-400 text-black px-14 py-6 rounded-3xl font-bold text-2xl">
                Ver Pronósticos ↓
            </button>
        </div>
    </div>

    <!-- App Principal -->
    <div id="mainApp" class="pt-8">
        <div class="grid grid-cols-3 gap-3 p-6">
            <button onclick="window.open('https://www.betmines.com/es','_blank')" class="bg-zinc-800 p-4 rounded-2xl text-center">Betmines</button>
            <button onclick="window.open('https://www.forebet.com/es/predicciones','_blank')" class="bg-zinc-800 p-4 rounded-2xl text-center">Forebet</button>
            <button onclick="window.open('https://www.adamchoi.co.uk/','_blank')" class="bg-zinc-800 p-4 rounded-2xl text-center">AdamChoi</button>
        </div>

        <div class="px-6">
            <button onclick="document.getElementById('fileInput').click()" class="w-full bg-yellow-400 text-black py-6 rounded-3xl font-bold text-xl">
                📁 CARGAR NUEVO EXCEL
            </button>
            <input type="file" id="fileInput" accept=".xlsx" class="hidden">
        </div>

        <div id="sportTabs" class="flex flex-wrap gap-2 px-6 pb-4"></div>
        <div id="content" class="px-6"></div>
    </div>

<script>
// Código completo del Excel (mismo que antes)
let allData = {};
let currentSport = '';

if (localStorage.getItem('pronosticosData')) {
    allData = JSON.parse(localStorage.getItem('pronosticosData'));
}

function renderTabs() {
    const container = document.getElementById('sportTabs');
    container.innerHTML = '';
    Object.keys(allData).forEach(sport => {
        const btn = document.createElement('button');
        btn.textContent = sport;
        btn.className = `px-6 py-3 rounded-full font-bold ${currentSport === sport ? 'bg-yellow-400 text-black' : 'bg-zinc-800 text-white'}`;
        btn.onclick = () => window.switchSport(sport);
        container.appendChild(btn);
    });
}

window.switchSport = function(sport) {
    currentSport = sport;
    const data = allData[sport] || [];
    let html = `<h2 class="text-yellow-400 text-2xl font-bold mb-6 px-2 capitalize">${sport}</h2>`;

    data.forEach(p => {
        const h = Math.round((p['1x2_h']||0)*100);
        const d = Math.round((p['1x2_d']||0)*100);
        const a = Math.round((p['1x2_a']||0)*100);
        html += `
        <div class="bg-zinc-900 rounded-3xl p-6 mb-6">
            <div class="text-amber-400 text-sm">${p.date || ''}</div>
            <div class="font-bold text-xl mt-2">${p.home} vs ${p.away}</div>
            <div class="grid grid-cols-3 gap-6 mt-6">
                <div class="text-center"><div class="text-3xl font-bold text-green-400">${h}%</div><div class="text-xs">LOCAL</div></div>
                <div class="text-center"><div class="text-3xl font-bold text-yellow-400">${d}%</div><div class="text-xs">EMPATE</div></div>
                <div class="text-center"><div class="text-3xl font-bold text-red-400">${a}%</div><div class="text-xs">VISITA</div></div>
            </div>
        </div>`;
    });

    document.getElementById('content').innerHTML = html || '<p class="text-center py-20 text-gray-500">Carga tu Excel</p>';
};

if (Object.keys(allData).length > 0) {
    renderTabs();
    window.switchSport(Object.keys(allData)[0]);
}

document.getElementById('fileInput').onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
        try {
            const wb = XLSX.read(ev.target.result, {type:'binary'});
            allData = {};
            wb.SheetNames.forEach(name => {
                const sheetData = XLSX.utils.sheet_to_json(wb.Sheets[name]);
                if (sheetData.length > 0) allData[name] = sheetData;
            });
            localStorage.setItem('pronosticosData', JSON.stringify(allData));
            renderTabs();
            window.switchSport(Object.keys(allData)[0]);
        } catch(err) {
            alert('Error leyendo el Excel');
        }
    };
    reader.readAsBinaryString(file);
};
</script>
</body>
</html>
